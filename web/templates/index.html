<!DOCTYPE html>
<html>
<head>
  <title>Migrate-ease Scanner</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="https://bootswatch.com/5/lumen/bootstrap.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    .dropdown-submenu { position: relative; }
    .dropdown-submenu.show > .dropdown-menu { display: block; }
    .dropdown-submenu > .dropdown-menu { bottom: 0; top: auto; right: 100%; }
    .dropdown-menu .dropdown-item { font-weight: bold; }

    /* ===== Instance dropdown item with info link ===== */
    .dropdown-menu .csp-instance-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-right: 8px;
    }
    .dropdown-menu .csp-instance-item .instance-name { flex: 1; }
    .dropdown-menu .csp-instance-item .instance-info-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      font-size: 12px;
      text-decoration: none;
      transition: all 0.15s ease;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .dropdown-menu.scanner-menu {
      min-width: 240px;
      padding: 0.75rem 1rem;
    }
    .dropdown-menu.scanner-menu .form-check { margin-bottom: 0.35rem; }
    .dropdown-menu.scanner-menu .form-check-label { font-weight: 600; }


  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="jumbotron">
      <h1 class="display-3 text-primary">AArch64 Migration Advisor</h1>
      <hr class="bg-primary">
    </div>
  </div>

  <div class="container mt-4">
    <div class="row">
      <div id="status-panel" class="mt-1">
        <div id="console-output" class="bg-dark text-light p-3" style="height: 550px; overflow-y: auto; font-family: monospace; font-size:12px; margin-bottom: 1rem!important">
        </div>
      </div>
    </div>

    <ul class="nav nav-underline mb-3" role="tablist">
      <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="tab" data-bs-target="#scan-git-pane" role="tab">Git Repo</a>
      </li>
      <li class="nav-item">
          <a class="nav-link" data-bs-toggle="tab" data-bs-target="#scan-archive-pane" role="tab">Source archive</a>
      </li>

      <!-- Nested Dropdown -->
      <li class="nav-item dropdown ms-auto dropup">
        <button class="btn btn-outline-primary dropdown-toggle" type="button" id="moreoptions-btn" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-gear-fill"></i>
        </button>
        <ul class="dropdown-menu">
          <!-- CSP and instance submenu -->
          <li class="dropdown-submenu">
            <a class="dropdown-item dropdown-toggle" href="#"> CSP &raquo; </a>
            <ul class="dropdown-menu" id="csp-menu"></ul>
          </li>
          <!-- Report format submenu -->
          <li><hr class="dropdown-divider"></li>
          <li class="dropdown-submenu">
            <a class="dropdown-item dropdown-toggle" href="#"> Report Format &raquo; </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item report-format-item active" href="#" data-output-format="json">JSON</a></li>
              <li><a class="dropdown-item report-format-item" href="#" data-output-format="html">HTML</a></li>
              <li><a class="dropdown-item report-format-item" href="#" data-output-format="text">Text</a></li>
              <li><a class="dropdown-item report-format-item" href="#" data-output-format="csv">CSV</a></li>
            </ul>
          </li>

          <li><hr class="dropdown-divider"></li>

          <!-- Scanner (multi-select) -->
          <li class="dropdown-submenu">
            <a class="dropdown-item dropdown-toggle" href="#"> Scanner &raquo; </a>
            <ul class="dropdown-menu scanner-menu">
              <!-- Default: all checked -->
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="all" id="scanner-all" checked>
                <label class="form-check-label" for="scanner-all">All</label>
              </li>

              <li><hr class="dropdown-divider"></li>

              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="cpp" id="scanner-cpp">
                <label class="form-check-label" for="scanner-cpp">C/C++</label>
              </li>
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="go" id="scanner-go">
                <label class="form-check-label" for="scanner-go">Go</label>
              </li>
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="rust" id="scanner-rust">
                <label class="form-check-label" for="scanner-rust">Rust</label>
              </li>
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="java" id="scanner-java">
                <label class="form-check-label" for="scanner-java">Java</label>
              </li>
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="python" id="scanner-python">
                <label class="form-check-label" for="scanner-python">Python</label>
              </li>
              <li class="form-check">
                <input class="form-check-input scanner-checkbox" type="checkbox" value="docker" id="scanner-docker">
                <label class="form-check-label" for="scanner-docker">Docker</label>
              </li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>

    <div class="tab-content">
       <div class="tab-pane fade show active" id="scan-git-pane" role="tabpanel">
        <form id="scan-git-form" class="" name="scan-git-form">
          <div class="row mb-3">
            <div class="col-md-7">
              <div class="input-group">
                <span class="input-group-text">Git Repo</span>
                <input type="text" name="git-repo" class="form-control" required>
              </div>
            </div>
            <div class="col-md-3">
              <div class="input-group">
                <span class="input-group-text">Branch</span>
                <input type="text" name="git-branch" class="form-control">
              </div>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-primary" type="button" id="action-git-btn" style="width: 100%;">SCAN</button>
              <div class="d-none report-pane">
                <span class="label-success">Report:</span>
                <a href="/report" class="btn border-0" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Download report"><i class="fas fa-download text-primary"></i></a>
                <a href="/result" target="_blank" class="btn border-0" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="View report"><i class="fas fa-eye text-primary"></i></a>
              </div>
            </div>
          </div>
        </form>
       </div>

       <div class="tab-pane fade" id="scan-archive-pane" role="tabpanel">
        <form id="scan-archive-form" class="" name="scan-archive-form">
          <div class="row mb-3">
            <div class="col-md-10">
              <div class="input-group">
                <input type="file" class="form-control" name="archive-file" accept=".zip,.tar">
              </div>
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-primary" type="button" id="action-archive-btn" style="width: 100%;">SCAN</button>
              <div class="d-none report-pane">
                <span class="label-success">Report:</span>
                <a href="/report" class="btn border-0" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Download report"><i class="fas fa-download text-primary"></i></a>
                <a href="/result" target="_blank" class="btn border-0" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="View report"><i class="fas fa-eye text-primary"></i></a>
              </div>
            </div>
          </div>
        </form>
       </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
        $(document).ready(function() {
            // ========================================
            //  CSP / Instance Data
            // ========================================
            var instance_list = [
              {
                name: "AliCloud",
                types: [
                  { name: 'c8y', doc_link: 'https://www.alibabacloud.com/help/en/ecs/user-guide/overview-of-instance-families#c8y' },
                  { name: 'c6r', doc_link: 'https://www.alibabacloud.com/help/en/ecs/user-guide/overview-of-instance-families#c6r' },
                  { name: 'g8y', doc_link: 'https://www.alibabacloud.com/help/en/ecs/user-guide/overview-of-instance-families#g8y' },
                  { name: 'g6r', doc_link: 'https://www.alibabacloud.com/help/en/ecs/user-guide/overview-of-instance-families#g6r' },
                  { name: 'r8y', doc_link: 'https://www.alibabacloud.com/help/en/ecs/user-guide/overview-of-instance-families#r8y' },
                ]
              }
            ];

            // ========================================
            //  Dynamically build the CSP dropdown menu
            // ========================================
            function buildCspMenu() {
              var $cspMenu = $('#csp-menu');
              $cspMenu.empty();

              instance_list.forEach(function (csp) {
                // CSP-level submenu
                var $cspLi = $('<li class="dropdown-submenu"></li>');
                var $cspLink = $('<a class="dropdown-item dropdown-toggle" href="#"></a>')
                  .attr('data-csp', csp.name)
                  .text(' ' + csp.name).append(' &raquo;');
                var $instanceMenu = $('<ul class="dropdown-menu"></ul>');

                // Instance items
                csp.types.forEach(function (inst) {
                  var $li = $('<li></li>');
                  var $a = $('<a class="dropdown-item csp-instance-item" href="#"></a>')
                    .attr('data-instance', inst.name);

                  var $name = $('<span class="instance-name"></span>').text(inst.name);
                  var $infoLink = $('<span class="instance-info-link"></span>')
                    .attr('data-info-url', inst.doc_link)
                    .attr('title', 'View ' + inst.name + ' instance docs')
                    .html('<i class="fas fa-external-link-alt"></i>');

                  $a.append($name).append($infoLink);
                  $li.append($a);
                  $instanceMenu.append($li);
                });

                $cspLi.append($cspLink).append($instanceMenu);
                $cspMenu.append($cspLi);
              });

              // Instance selection click handler
              $cspMenu.find('a.dropdown-item[data-instance]').on('click', function (e) {
                e.preventDefault();
                // If click was on the info-link icon, open docs instead
                if ($(e.target).closest('.instance-info-link').length) {
                  e.stopPropagation();
                  var url = $(e.target).closest('.instance-info-link').data('info-url');
                  if (url) {
                    window.open(url, '_blank', 'noopener');
                  }
                  return;
                }
                $cspMenu.find('a.dropdown-item[data-instance]').removeClass('active');
                $(this).addClass('active');
              });
            }

            // Initialize CSP menu
            buildCspMenu();

            $('[data-bs-toggle="tooltip"]').tooltip();
            // Handle dropdown submenu toggle
            $('.dropdown-submenu > a').on("click", function (e) {
              e.preventDefault();
              e.stopPropagation();

              var $submenu = $(this).next('.dropdown-menu');
              var $parent = $(this).parent();
              $parent.siblings('.dropdown-submenu').removeClass('show').find('.dropdown-menu').hide();
              $submenu.toggle();
              $parent.toggleClass('show');
            });

            // CSP instance selection (single-select)
            $('.dropdown-submenu .dropdown-menu a.csp-instance-item').on('click', function (e) {
              e.preventDefault();
              $('.dropdown-submenu .dropdown-menu a.csp-instance-item').removeClass('active');
              $(this).addClass('active');
            });

            // Report format selection (single-select)
            $('.dropdown-submenu .dropdown-menu a.report-format-item').on('click', function (e) {
              e.preventDefault();
              $('.dropdown-submenu .dropdown-menu a.report-format-item').removeClass('active');
              $(this).addClass('active');
            });

            // Read CSP and instance
            function get_selected_csp_and_instance() {
              var $instanceItem = $('.dropdown-submenu .dropdown-menu a.csp-instance-item.active');
              var csp = $instanceItem.closest('.dropdown-submenu').children('a[data-csp]').data('csp') || '';
              var instance = $instanceItem.data('instance') || '';
              if (csp !== '' && instance === '') {
                csp = ''; // if instance is not defined, remove csp info
              }
              return { csp: csp, instance: instance };
            }

            // Read selected report format (default json).
            function get_selected_output_format() {
              var $fmt = $('.dropdown-submenu .dropdown-menu a.report-format-item.active');
              return ($fmt.data('output-format') || 'json');
            }

            // Scanner option behavior (multi-select):
            // 1) default: all checked
            // 2) check "all" => all specifics checked
            // 3) uncheck "all" => all specifics unchecked
            function getSpecificScannerCheckboxes() {
              return $('.scanner-checkbox').not('#scanner-all');
            }

            $('#scanner-all').on('change', function() {
              if ($(this).is(':checked')) {
                getSpecificScannerCheckboxes().prop('checked', true);
              } else {
                getSpecificScannerCheckboxes().prop('checked', false);
              }
            });

            // If user manually unchecks any specific scanner, also uncheck "all"
            getSpecificScannerCheckboxes().on('change', function() {
              if (!$(this).is(':checked')) {
                $('#scanner-all').prop('checked', false);
              }
            });

            function getSelectedScannersString() {
              if ($('#scanner-all').is(':checked')) return 'all';

              var scanners = [];
              getSpecificScannerCheckboxes().each(function() {
                if ($(this).is(':checked')) scanners.push($(this).val());
              });

              // Default to scan all
              return scanners.length ? scanners.join(',') : 'all';
            }
            // Default option is to scan all languages
            getSpecificScannerCheckboxes().prop('checked', true);


            // Form submission
            $('#scan-git-form').on('submit', function(e) {
                e.preventDefault();

                var formData = new FormData(this);
                // Add csp and instance value to formData
                var selectedCspInstance = get_selected_csp_and_instance();
                formData.append('csp', selectedCspInstance.csp);
                formData.append('instance', selectedCspInstance.instance);
                // Add report format value to formData
                formData.append('output-format', get_selected_output_format());
                // Add selected scanners to formData
                formData.append('language', getSelectedScannersString());

                $.ajax({
                    url: '/scan/git',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.status != 'ERROR') {
                          $('#action-git-btn').html("<span class='spinner-border  spinner-border-sm' role='status' aria-hidden='true'></span>&nbsp;"+response.status);
                          $('#status-panel').removeClass('d-none');
                          pollStatus('#action-git-btn');
                        } else {
                          alert(response.message);
                          // Re-enable button
                          $('#action-git-btn').prop('disabled', false);
                        }
                    }
                });
            });

            $('#action-git-btn').click(function() {
                current_status = $(this).text();
                if ('SCAN' == current_status) {
                    git_repo = $('input[name="git-repo"]').val();
                    if (git_repo == '') {
                        alert("No git repo is given!");
                    } else {
                        // Submit form
                        $('#scan-git-form').submit();
                        // Disable button to avoid multiple submissions
                        $(this).prop('disabled', true);
                    }
                }
            });

            // Status poll
            function pollStatus(btn_name) {
                $.get('/status', function(response) {
                    var consoleDiv = $('#console-output');
                    consoleDiv.html(response.output.join('<br>'));
                    // Auto-scroll to bottom
                    consoleDiv.scrollTop(consoleDiv[0].scrollHeight);
                    console.log(response.status + '/' + btn_name);

                    switch (response.status) {
                      case "UPLOADING":
                      case "FETCHING":
                      case "SCANNING":
                          $(btn_name).contents().eq(1).replaceWith("&nbsp;"+response.status);
                          setTimeout(function(){pollStatus(btn_name);}, 1000);
                          break;
                      case "FAILED":
                      case "ERROR":
                          $(btn_name).addClass("btn-danger");
                      default:
                          // Re-enable button
                          $(btn_name).prop('disabled', false);
                          $(btn_name).text(response.status);
                          if (response.status == 'COMPLETED')
                            $(btn_name).next('.report-pane').removeClass('d-none')
                    }
                });
            }

            $('#scan-archive-form').on('submit', function(e) {
                e.preventDefault();

                var formData = new FormData(this);
                // Add csp and instance value to formData
                var selectedCspInstance = get_selected_csp_and_instance();
                formData.append('csp', selectedCspInstance.csp);
                formData.append('instance', selectedCspInstance.instance);
                // Add report format value to formData
                formData.append('output-format', get_selected_output_format());
                // Add selected scanners to formData
                formData.append('language', getSelectedScannersString());

                $.ajax({
                    url: '/scan/file',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.status != 'ERROR') {
                          $('#action-archive-btn').html("<span class='spinner-border  spinner-border-sm' role='status' aria-hidden='true'></span>&nbsp;"+response.status);
                          $('#status-panel').removeClass('d-none');
                          pollStatus('#action-archive-btn');
                        } else {
                          alert(response.message);
                          // Re-enable button
                          $('#action-archive-btn').prop('disabled', false);
                        }
                    }
                });
            });

            $('#action-archive-btn').click(function() {
                current_status = $(this).text();
                if ('SCAN' == current_status) {
                    filename = $('input[name="archive-file"]').val();
                    if (filename == '') {
                        alert("No package to scan!");
                    } else {
                        // submit form
                        $('#scan-archive-form').submit();
                        $(this).prop('disabled', true);
                    }
                }
            });
        });

  </script>
</body>
</html>
